<html lang="en">

  /**
   * ══════════════════════════════════════════════════════
   *  PROFILE CONFIG — edit ONLY this section

   */
  var CONTACT = Object.freeze({
    firstName: 'Max',
    lastName:  'Polwin',
    org:       'agradblue GmbH (part of Westbridge)',
    title:     'Senior Consultant',
    email:     'max.polwin@agradblue.com',
    phone:     '+49 173 588 48 17',
    linkedin:  'https://www.linkedin.com/in/maxpolwin/',
    url:       'https://agradblue.com',
    street:    'Barckhausstrasse 12-14',
    city:      'Frankfurt am Main',

    country:   'Germany',
    photo:     'photo.jpg',

</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <meta name="description" content="">
  <meta name="robots" content="noindex, nofollow">
  <!-- No external tracking, no cookies, no analytics — privacy first -->
  <!-- Open Graph for link previews -->
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:type" content="profile">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1A2B2E;
      --navy-light: #224955;
      --accent: #599AAB;
      --accent-hover: #224955;
      --green: #499466;
      --text: #F0F4F8;
      --text-muted: #8A8794;
      --card-bg: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 12px;
      --font-body: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
    /* ── Animated background blob ── */
    @keyframes blob-rotate {
      0%   { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: var(--font-body);
      background: linear-gradient(160deg, var(--navy) 0%, #1A2B2E 50%, #1A2B2E 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }
    .bg-blob {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 400px;
      background-image: linear-gradient(135deg, var(--navy), var(--green));
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      filter: blur(70px);
      opacity: 0;
      animation: blob-rotate 50s linear infinite;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .bg-blob.active {
      opacity: 0.45;
    }
    /* ── Card Container ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    /* ── Header with accent bar ── */
    .card-header {
      padding: 2rem 1.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .card-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--green));
    }
    .org-logo {
      margin-bottom: 0.75rem;
      color: var(--text);
      opacity: 0.85;
    }
    .org-logo svg {
      display: block;
      width: 180px;
      height: auto;
    }
    .name {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }
    .title {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 400;
    }
    /* ── Contact Links ── */
    .contact-list {
      padding: 1.25rem 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0.7rem 0.75rem;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.2s ease;
    }
    .contact-item:hover,
    .contact-item:focus-visible {
      background: rgba(52, 153, 172, 0.1);
      outline: none;
    }
    .contact-item:focus-visible {
      box-shadow: 0 0 0 2px var(--accent);
    }
    .contact-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      color: var(--text-muted);
    }
    .contact-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: block;
      margin-bottom: 0.1rem;
    }
    .contact-value {
      font-size: 0.9rem;
      display: block;
    }
    /* ── Event Input Section ── */
    .event-section {
      padding: 0.5rem 1.75rem 0.75rem;
    }
    .event-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
    .event-input-row {
      display: flex;
      align-items: center;
      position: relative;
    }
    .event-input-icon {
      position: absolute;
      left: 0.65rem;
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
      opacity: 0.6;
      transition: color 0.2s ease, opacity 0.2s ease;
    }
    .event-input-row.has-value .event-input-icon {
      color: var(--text-muted);
      opacity: 1;
    }
    .event-input {
      flex: 1;
      padding: 0.6rem 2rem 0.6rem 2.1rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .event-input-row.has-value .event-input {
      border-color: rgba(52, 153, 172, 0.3);
      background: rgba(52, 153, 172, 0.06);
    }
    .event-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    .event-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(52, 153, 172, 0.2);
    }
    .event-clear {
      position: absolute;
      right: 0.5rem;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0.2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }
    .event-input-row.has-value .event-clear {
      opacity: 0.5;
      pointer-events: auto;
    }
    .event-clear:hover {
      opacity: 1;
    }
    /* ── Contact Photo / Avatar ── */
    .card-header-top {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      background: rgba(52, 153, 172, 0.15);
      border: 2px solid rgba(52, 153, 172, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* SVG fallback logo shown when no photo is set */
    .avatar-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .avatar-fallback svg {
      width: 36px;
      height: 36px;
    }
    .card-header-info {
      flex: 1;
      min-width: 0;
    }
    /* ── Save Contact Button ── */
    .actions {
      padding: 0.75rem 1.75rem 1.75rem;
    }
    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.875rem 1.25rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    .btn-save:hover { background: var(--accent-hover); }
    .btn-save:active { transform: scale(0.98); }
    .btn-save:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(34, 73, 85, 0.4);
    }
    .btn-icon {
      width: 18px;
      height: 18px;
    }
    /* ── Footer ── */
    .card-footer {
      padding: 1rem 1.75rem;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .card-footer p {
      font-size: 0.7rem;
      color: var(--text-muted);
      opacity: 0.6;
    }
    /* ── Accessibility: reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, .bg-blob { animation: none !important; transition: none !important; }
    }
    /* ── High contrast mode ── */
    @media (prefers-contrast: high) {
      .contact-item:hover { background: rgba(52, 153, 172, 0.25); }
      .card { border-color: rgba(255, 255, 255, 0.3); }
    }
  </style>
</head>
<body>
  <!-- Animated background blob -->
  <div class="bg-blob"></div>

  <main class="card" role="main">
    <!-- Header -->

  <script>
    /**
     * ── Populate page from CONTACT config ──
     * Everything below reads from the single CONTACT object above.
     * No need to edit anything below this line.
     */
    (function () {
      var C = CONTACT;
      var fullName = C.firstName + ' ' + C.lastName;

      // Meta tags & page title
      document.title = fullName + ' — ' + C.footerOrg;
      var setMeta = function (attr, val, content) {
        var el = document.querySelector('meta[' + attr + '="' + val + '"]');
        if (el) el.setAttribute('content', content);
      };
      setMeta('name', 'description', 'Digital Business Card — ' + C.title);
      setMeta('property', 'og:title', fullName + ' — ' + C.footerOrg);
      setMeta('property', 'og:description', C.title);

      // Header
      document.getElementById('display-name').textContent = fullName;
      document.getElementById('display-title').textContent = C.title;
      document.getElementById('display-org').textContent = C.org;

      // Avatar
      var avatarImg = document.getElementById('avatar-img');
      if (C.photo) {
        avatarImg.src = C.photo;
        avatarImg.alt = fullName;
      }

      // Contact links
      document.getElementById('link-email').href = 'mailto:' + C.email;
      document.getElementById('display-email').textContent = C.email;

      var phoneDigits = C.phone.replace(/\s+/g, '');
      document.getElementById('link-phone').href = 'tel:' + phoneDigits;
      document.getElementById('display-phone').textContent = C.phone;

      document.getElementById('link-linkedin').href = C.linkedin;

      // Footer
      var footerEl = document.querySelector('.card-footer');
      if (C.showFooter) {
        document.getElementById('display-footer').textContent =
          C.footerOrg + ' · ' + C.street + ' · ' + C.zip + ' ' + C.city;
      } else {
        footerEl.style.display = 'none';
      }
    })();

    /**
     * Dynamic vCard generator with event context.
     *
     * - URL parameter ?event=... pre-fills the input (always editable)
     * - User can amend, replace, or clear the event text
     * - NOTE field in vCard stores the event for the recipient's address book
     *
     * Privacy: All processing happens client-side. No data is sent anywhere.
     */
    // ── DOM refs ──
    var eventInput = document.getElementById('event-input');
    var eventInputRow = document.getElementById('event-input-row');
    var eventClear = document.getElementById('event-clear');
    var btnSave = document.getElementById('btn-save');
    // ── Sanitize user input for vCard safety ──
    function sanitize(str) {
      if (!str) return '';
      return str
        .replace(/[<>]/g, '')
        .replace(/[\r\n]+/g, ' ')
        .replace(/[;\\]/g, '')
        .trim()
        .slice(0, 120);
    }
    // ── Toggle .has-value class for styling ──
    function updateInputState() {
      if (eventInput.value.trim()) {
        eventInputRow.classList.add('has-value');
      } else {
        eventInputRow.classList.remove('has-value');
      }
    }
    // ── Read event: URL param first, then fetch current-event.json as fallback ──
    function initEventField() {
      // 1. URL parameter takes priority (?event=...)
      try {
        var params = new URLSearchParams(window.location.search);
        var urlEvent = sanitize(params.get('event') || '');
        if (urlEvent) {
          eventInput.value = urlEvent;
          updateInputState();
          return; // URL param wins, skip remote fetch
        }
      } catch (_e) { /* graceful fallback */ }

      // 2. Fetch current-event.json (editable without regenerating pass)
      fetch('current-event.json?' + Date.now())
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          if (data && data.event && !eventInput.value.trim()) {
            eventInput.value = sanitize(data.event);
            updateInputState();
          }
        })
        .catch(function () { /* no event file — that's fine */ });

      updateInputState();
    }
    // ── Clear button ──
    eventClear.addEventListener('click', function () {
      eventInput.value = '';
      updateInputState();
      eventInput.focus();
    });
    // ── Track input changes for styling ──
    eventInput.addEventListener('input', updateInputState);
    // ── Escape vCard field values (RFC 6350) ──
    function escapeVCard(str) {
      if (!str) return '';
      return str
        .replace(/\\/g, '\\\\')
        .replace(/;/g, '\\;')
        .replace(/,/g, '\\,')
        .replace(/\n/g, '\\n');
    }
    // ── Build vCard 3.0 string ──
    function buildVCard(photoBase64) {
      var event = sanitize(eventInput.value);
      var now = new Date();
      var dateStr = now.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      var note = event || '';
      var lines = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'N:' + escapeVCard(CONTACT.lastName) + ';' + escapeVCard(CONTACT.firstName) + ';;;',
        'FN:' + escapeVCard(CONTACT.firstName + ' ' + CONTACT.lastName),
        'ORG:' + escapeVCard(CONTACT.org),
        'TITLE:' + escapeVCard(CONTACT.title),
        'TEL;TYPE=WORK,VOICE:' + CONTACT.phone,
        'EMAIL;TYPE=WORK:' + CONTACT.email,
        'URL:' + CONTACT.linkedin,
        'URL:' + CONTACT.url,
        'ADR;TYPE=WORK:;;' + escapeVCard(CONTACT.street) + ';'
          + escapeVCard(CONTACT.city) + ';;'
          + escapeVCard(CONTACT.zip) + ';'
          + escapeVCard(CONTACT.country),
        'NOTE:' + escapeVCard(note),
        'REV:' + dateStr,
      ];
      // Embed contact photo if available
      if (photoBase64) {
        var photoLine = 'PHOTO;ENCODING=b;TYPE=JPEG:' + photoBase64;
        var folded = foldLine(photoLine);
        lines.push(folded);
      }
      lines.push('END:VCARD');
      return lines.join('\r\n');
    }
    // ── Fold long vCard lines at 75 chars (RFC 2426 §2.6) ──
    function foldLine(line) {
      if (line.length <= 75) return line;
      var result = line.slice(0, 75);
      var pos = 75;
      while (pos < line.length) {
        result += '\r\n ' + line.slice(pos, pos + 74);
        pos += 74;
      }
      return result;
    }
    // ── Load photo as Base64 (cached after first load) ──
    var cachedPhotoBase64 = null;
    var photoLoadAttempted = false;
    function loadPhoto(callback) {
      if (photoLoadAttempted) {
        callback(cachedPhotoBase64);
        return;
      }
      var avatarImg = document.getElementById('avatar-img');
      if (!avatarImg || !avatarImg.src) {
        photoLoadAttempted = true;
        cachedPhotoBase64 = null;
        callback(null);
        return;
      }
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function () {
        try {
          var canvas = document.createElement('canvas');
          var size = 200;
          canvas.width = size;
          canvas.height = size;
          var ctx = canvas.getContext('2d');
          var sx = 0, sy = 0, sw = img.width, sh = img.height;
          if (sw > sh) {
            sx = (sw - sh) / 2;
            sw = sh;
          } else {
            sy = (sh - sw) / 2;
            sh = sw;
          }
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, size, size);
          var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
          cachedPhotoBase64 = dataUrl.split(',')[1] || null;
        } catch (_e) {
          cachedPhotoBase64 = null;
        }
        photoLoadAttempted = true;
        callback(cachedPhotoBase64);
      };
      img.onerror = function () {
        photoLoadAttempted = true;
        cachedPhotoBase64 = null;
        callback(null);
      };
      img.src = avatarImg.src;
    }
    // ── Download vCard as .vcf file ──
    function downloadVCard() {
      btnSave.disabled = true;
      loadPhoto(function (photoBase64) {
        var vcardData = buildVCard(photoBase64);
        var blob = new Blob([vcardData], { type: 'text/vcard;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = CONTACT.firstName + '_' + CONTACT.lastName + '.vcf';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(function () {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          btnSave.disabled = false;
        }, 100);
      });
    }
    // ── Wire up ──
    btnSave.addEventListener('click', downloadVCard);
    initEventField();
  </script>
</body>
